<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>白云智造 | 云端制造协同平台</title>
    <meta name="description" content="白云智造是新一代云端制造协同平台，覆盖 MES、QMS、WMS、APS 全链条，助力工厂数字化转型。" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2302b980'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='24' font-family='system-ui' font-weight='900' fill='white'%3EBY%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.onerror = function(msg, url, line, col, err) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:16px;background:#ff4d4f;color:#fff;font-size:14px;z-index:99999;font-family:monospace;white-space:pre-wrap';
        d.textContent = 'JS Error: ' + msg + '\n' + (url||'') + ':' + line + ':' + col + '\n' + (err&&err.stack||'');
        document.body.appendChild(d);
      };
      window.addEventListener('unhandledrejection', function(e) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:16px;background:#fa8c16;color:#fff;font-size:14px;z-index:99999;font-family:monospace;white-space:pre-wrap';
        d.textContent = 'Unhandled Promise: ' + (e.reason&&e.reason.stack||e.reason||'unknown');
        document.body.appendChild(d);
      });
    </script>
  </body>
</html>
